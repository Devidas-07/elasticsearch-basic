version: '3.8'

services:
  elasticsearch:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  python-app:
    image: python:3.9-slim
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    command: sh -c "pip install -r requirements.txt && python match_phrase_prefix.py"

volumes:
  elasticsearch-data: